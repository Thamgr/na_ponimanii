version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: na_ponimanii_app
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./env:/app/env
    environment:
      - API_HOST=0.0.0.0
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
      - "8001:8001"  # Bot metrics port
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: >
      bash -c "
        mkdir -p /app/data &&
        /app/venv/bin/python src/server/app.py &
        /app/venv/bin/python src/bot/telegram_bot.py
      "
    networks:
      - na_ponimanii_network

  prometheus:
    image: prom/prometheus:latest
    container_name: na_ponimanii_prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - na_ponimanii_network

  grafana:
    image: grafana/grafana:latest
    container_name: na_ponimanii_grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - na_ponimanii_network

networks:
  na_ponimanii_network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: